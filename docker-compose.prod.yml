# Production-style: only the auth API container.
# Provide DB_* and REDIS_URL (managed Postgres / Redis, Neon, ElastiCache, etc.) via .env or your platform’s secret store.

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: ${AUTH_IMAGE:-auth-service:latest}
    ports:
      - '${AUTH_PORT:-3000}:${CONTAINER_PORT:-3000}'
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: ${CONTAINER_PORT:-3000}
    restart: unless-stopped
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'wget -qO- "http://127.0.0.1:$${PORT:-3000}/health" || exit 1',
        ]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
