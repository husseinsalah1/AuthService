# Fly.io — from this directory run: `fly deploy`
# See https://fly.io/docs/reference/configuration/
#
# First-time setup (run once):
#   fly launch --no-deploy --copy-config --name authservice-rm --region ams
#   fly redis create                                   # pick the same region (ams)
#   fly redis attach <redis-name> --app authservice-rm # injects REDIS_URL secret
#   fly secrets set --app authservice-rm \
#     DB_HOST=...neon.tech DB_PORT=5432 \
#     DB_USERNAME=... DB_PASSWORD=... DB_NAME=... \
#     DB_SSL=true DB_SYNC=false DB_LOGGING=false \
#     JWT_ACCESS_SECRET="$(openssl rand -hex 48)" \
#     JWT_REFRESH_SECRET="$(openssl rand -hex 48)"
#
# NOTE: keep Fly region close to the database. Neon is in us-east-1 right now;
#       either move the Neon project to an EU region or change primary_region to "iad".

app = "authservice-rm"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile"
  build-target = "production"

[env]
  # Dev stage: verbose errors / logging on Fly. Flip to "production" before going live.
  NODE_ENV = "development"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

# TODO: once a `src/data-source.ts` + `src/migrations/` exist, switch DB_SYNC=false
# and uncomment to run migrations on every deploy:
# [deploy]
#   release_command = "npm run migration:run"
