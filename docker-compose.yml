# Local full stack: PostgreSQL + Redis + auth API.
# Copy .env.example to .env and set secrets before `docker compose up`.

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: auth_service
    ports:
      - '${AUTH_PORT:-3000}:3000'
    env_file:
      - .env
    environment:
      NODE_ENV: development
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - auth_network

  postgres:
    image: postgres:16-alpine
    container_name: auth_postgres
    ports:
      - '${POSTGRES_PUBLISH_PORT:-5432}:5432'
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - auth_network

  redis:
    image: redis:7-alpine
    container_name: auth_redis
    ports:
      - '${REDIS_PUBLISH_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - auth_network

volumes:
  postgres_data:
  redis_data:

networks:
  auth_network:
    driver: bridge
