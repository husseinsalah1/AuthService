# Local full stack: PostgreSQL + Redis + auth API.
# Copy .env.example to .env and set secrets before `docker compose up`.
# Uses the default Compose network so service DNS (postgres, redis) works reliably on Docker Desktop.

name: auth

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: auth_service
    ports:
      - '${AUTH_PORT:-3000}:3000'
    env_file:
      - .env
    # Lets Linux resolve host.docker.internal to the host gateway (same file as .env for ${REDIS_PUBLISH_PORT}).
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    environment:
      NODE_ENV: development
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_SSL: 'false'
      # Literal URL so a blank REDIS_DOCKER_URL= line in host `.env` cannot wipe this out.
      # If `redis` DNS fails (some Docker Desktop setups), use docker-compose.override.yml:
      #   environment:
      #     REDIS_DOCKER_URL: redis://host.docker.internal:6379
      REDIS_DOCKER_URL: redis://redis:6379
      NODE_OPTIONS: --dns-result-order=ipv4first
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: auth_postgres
    ports:
      - '${POSTGRES_PUBLISH_PORT:-5432}:5432'
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: auth_redis
    ports:
      - '${REDIS_PUBLISH_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
